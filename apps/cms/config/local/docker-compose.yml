version: '3.7'
services:
  caddy:
    container_name: caddy
    image: caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ../../site:/var/www/html/app
      - ../../index.php:/var/www/html/app
      - ../../logs:/logs
    depends_on:
      - php-fpm
    env_file:
      - ../../.env
  php-fpm:
    container_name: php-fpm
    build: .
    restart: unless-stopped
    volumes:
      - ../../site:/var/www/html/app
      - ../../index.php:/var/www/html/app
      - ../../.user.ini:/usr/local/etc/php/conf.d/.user.ini
volumes:
  caddy_data:
  caddy_config:

networks:
  default:
    name: main
